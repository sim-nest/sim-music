[package]
name = "sim-lib-sound-audio-lift"
version = "0.1.1"
edition = "2024"
license = "MPL-2.0"
description = "SIM workspace package for sim lib sound audio lift."
readme = "README.md"
publish = true
repository = "https://github.com/sim-nest/sim-music"
homepage = "https://github.com/sim-nest/sim-music"

[dependencies]
num-rational = "0.4"
sim-cookbook = { version = "0.1.0" }
sim-kernel = { version = "0.1.0" }
sim-lib-core = { version = "0.1.0" }
sim-lib-music-analysis = { version = "0.1.0", optional = true, path = "../sim-lib-music-analysis" }
sim-lib-music-core = { version = "0.1.0", optional = true, path = "../sim-lib-music-core" }
sim-lib-pitch-core = { version = "0.1.0", path = "../sim-lib-pitch-core" }
sim-lib-sound-core = { version = "0.1.0", path = "../sim-lib-sound-core" }
sim-lib-sound-spectrum = { version = "0.1.0", path = "../sim-lib-sound-spectrum" }
sim-lib-sound-tuning = { version = "0.1.0", path = "../sim-lib-sound-tuning" }
thiserror = "2"

[build-dependencies]
sim-cookbook = { version = "0.1.0" }

[features]
default = []
sound-music = ["dep:sim-lib-music-core", "dep:sim-lib-music-analysis"]

[lints]
workspace = true
