[[feature]]
id = "feature/sim-music/audio-lift-and-render"
title = "Audio lift and render workflows"
summary = "Lift PCM audio into sound features, reuse spectral summaries, and render finite sound buffers or WAV/SMF stream files through current sound libraries."
owner = "crate/sim-lib-sound-audio-lift"
audiences = ["user", "code", "framework"]
guidance = "Use this row when analyzing audio features, routing audio lift results toward music analysis, or rendering offline buffers. Reuse sound-audio-lift for PCM feature extraction, sound-spectrum for descriptors, sound-render for buffers and WAV output, and stream bridge/file crates for interchange."
claims_anchors = [
  "anchor/crate/sim-lib-sound-audio-lift",
  "anchor/crate/sim-lib-sound-bridge",
  "anchor/crate/sim-lib-sound-render",
  "anchor/crate/sim-lib-stream-bridge",
  "anchor/runtime-lib/sim-lib-sound-audio-lift/sound-audio-lift-lib",
  "anchor/runtime-lib/sim-lib-sound-bridge/sound-bridge-lib",
  "anchor/runtime-lib/sim-lib-sound-render/sound-render-lib",
  "anchor/runtime-lib/sim-lib-stream-bridge/stream-bridge-lib",
]
claims_surfaces = [
  "docs/sim-music/generated",
]
claims_specimens = [
  "spec-test/sim-music/crates/sim-lib-sound-audio-lift/src/tests",
]

[[feature]]
id = "feature/sim-music/daw-session-runtime"
title = "DAW session runtime"
summary = "Represent tracks, clips, instruments, buses, and offline or live schedules as a loadable music session runtime."
owner = "crate/sim-lib-daw-session"
audiences = ["code", "framework"]
guidance = "Use this row when a caller needs a reusable session graph around music, synth, MIDI, and stream features."
claims_anchors = [
  "anchor/crate/sim-lib-daw-session",
  "anchor/runtime-lib/sim-lib-daw-session/daw-session-lib",
]
supports = [
  "feature/sim-music/midi-notation-workflows",
  "feature/sim-music/exact-music-analysis-and-transform",
  "feature/sim-music/audio-lift-and-render",
  "feature/sim-music/pitch-and-sound-vocabulary",
  "feature/sim-music/synth-performance-workbench",
]

[[route]]
id = "route/build-music-performance"
task = "Build a music performance"
audiences = ["user", "code", "framework"]
steps = [
  { feature = "feature/sim-music/pitch-and-sound-vocabulary", why = "The vocabulary row supplies pitch and sound descriptors." },
  { feature = "feature/sim-music/midi-notation-workflows", why = "The MIDI row moves material into and out of performance formats." },
  { feature = "feature/sim-music/exact-music-analysis-and-transform", why = "The exact music row owns reusable music objects, analysis descriptors, and sequence transforms." },
  { feature = "feature/sim-music/daw-session-runtime", why = "The DAW session row supplies the reusable session graph around the performance." },
  { feature = "feature/sim-music/synth-performance-workbench", why = "The synth row turns that material into local or browser-backed sound." },
  { specimen = "recipe/sim-music/crates/sim-lib-music-synth/01-basics/subtractive-preset", why = "The preset recipe is the smallest synth example." },
]

[[route]]
id = "route/lift-audio-features"
task = "Analyze current audio lift into music descriptors"
audiences = ["user", "code", "framework"]
steps = [
  { feature = "feature/sim-music/audio-lift-and-render", why = "The audio row owns PCM feature lift, spectral summaries, and offline render evidence for audio analysis." },
  { feature = "feature/sim-music/exact-music-analysis-and-transform", why = "The music analysis row owns pitch histograms and exact object descriptors that consume lifted musical material." },
  { specimen = "recipe/sim-music/crates/sim-lib-sound-audio-lift/01-basics/pcm-features", why = "The PCM feature recipe is the current audio-lift specimen." },
  { specimen = "recipe/sim-music/crates/sim-lib-music-analysis/01-basics/pitch-histogram", why = "The pitch-histogram recipe is the current exact music analysis specimen." },
]

[[route]]
id = "route/transform-exact-music"
task = "Transform exact music"
audiences = ["user", "code", "framework"]
steps = [
  { feature = "feature/sim-music/exact-music-analysis-and-transform", why = "The exact music row owns the object model, sequence transforms, lift/lower adapters, and notation descriptors." },
  { feature = "feature/sim-music/pitch-and-sound-vocabulary", why = "The pitch row supplies the pitch, scale, chord, and tuning vocabulary used by exact transforms." },
  { specimen = "recipe/sim-music/crates/sim-lib-music-transform/01-basics/sequence-transform", why = "The sequence-transform recipe is the current transform specimen." },
]

[[route]]
id = "route/import-export-smf"
task = "Import and export SMF"
audiences = ["user", "code", "framework"]
steps = [
  { feature = "feature/sim-music/midi-notation-workflows", why = "The MIDI row owns MIDI event, SMF, stream, and notation interchange." },
  { feature = "feature/sim-music/exact-music-analysis-and-transform", why = "The exact music row owns the lift and lower adapters between MIDI tracks and music descriptors." },
  { specimen = "recipe/sim-music/crates/sim-lib-midi-smf/01-basics/file-metadata", why = "The SMF metadata recipe proves the file owner." },
  { specimen = "recipe/sim-music/crates/sim-lib-music-lift/01-basics/from-midi-track", why = "The lift recipe imports MIDI track material into music descriptors." },
  { specimen = "recipe/sim-music/crates/sim-lib-music-lower/01-basics/to-midi-track", why = "The lower recipe exports music descriptors back to MIDI track material." },
]
