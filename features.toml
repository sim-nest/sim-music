schema = "sim.features"

[enforcement.audience]
user = "strict"
code = "strict"
framework = "advisory"

[enforcement.surface]
cli = "strict"
docs = "advisory"

[enforcement.route]
major_entrypoints = "advisory"
frameworks = "advisory"

[[feature]]
id = "feature/sim-music/generated-docs"
title = "Repository documentation surface"
summary = "Publish generated package, card, recipe, and index facts for the music, MIDI, pitch, and sound crates."
owner = "crate/xtask"
audiences = ["code"]
guidance = "Use this row when checking the generated documentation and index lane for the music repo."
claims_anchors = [
  "anchor/cli/xtask",
  "anchor/crate/xtask",
  "anchor/doc/generated/card-index",
  "anchor/doc/generated/feature-map",
  "anchor/doc/generated/provenance",
  "anchor/doc/generated/repo-contract",
  "anchor/doc/generated/rustdoc-index",
  "anchor/doc/generated/sim-index-fragment",
  "anchor/repo/sim-music",
]
claims_surfaces = [
  "cli/xtask",
  "docs/sim-music/generated",
]

