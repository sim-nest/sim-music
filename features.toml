[[feature]]
id = "feature/sim-music/daw-session-runtime"
title = "DAW session runtime"
summary = "Represent tracks, clips, instruments, buses, and offline or live schedules as a loadable music session runtime."
owner = "crate/sim-lib-daw-session"
audiences = ["code"]
guidance = "Use this row when a caller needs a reusable session graph around music, synth, MIDI, and stream features."
claims_anchors = [
  "anchor/crate/sim-lib-daw-session",
  "anchor/runtime-lib/sim-lib-daw-session/daw-session-lib",
]
supports = [
  "feature/sim-music/midi-notation-workflows",
  "feature/sim-music/pitch-and-sound-vocabulary",
  "feature/sim-music/synth-performance-workbench",
]

[[route]]
id = "route/build-music-performance"
task = "Build a music performance"
audiences = ["user", "code"]
steps = [
  { feature = "feature/sim-music/pitch-and-sound-vocabulary", why = "The vocabulary row supplies pitch and sound descriptors." },
  { feature = "feature/sim-music/midi-notation-workflows", why = "The MIDI row moves material into and out of performance formats." },
  { feature = "feature/sim-music/synth-performance-workbench", why = "The synth row turns that material into local or browser-backed sound." },
  { specimen = "recipe/sim-music/crates/sim-lib-music-synth/01-basics/subtractive-preset", why = "The preset recipe is the smallest synth example." },
]
